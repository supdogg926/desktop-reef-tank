name: GUT Tests

on: [push, pull_request]

jobs:
  run-gut:
    name: Run GUT tests (Godot 4.7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
      - name: Import project (headless warm-up)
        run: godot --headless --path . --import --quit
      - name: Run GUT
        env:
          GODOT_DISABLE_LEAK_CHECKS: "1"
        run: >
          godot --headless -d --display-driver headless --audio-driver Dummy
          --disable-render-loop --path . -s res://addons/gut/gut_cmdln.gd
          -gdir=res://tests/unit -ginclude_subdirs -gexit
